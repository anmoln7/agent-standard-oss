name: Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: build the site from the markdown sources
        run: |
          mkdir -p _site
          cp .github/pages.css _site/pages.css
          nav='<p class="site-nav"><a href="index.html">The Standard</a> · <a href="adopters.html">Adopters</a> · <a href="https://github.com/anmoln7/agent-standard-oss">GitHub ↗</a></p>'
          echo "$nav" > /tmp/nav.html
          pandoc STANDARD.md -s --toc --shift-heading-level-by=0 \
            --metadata title="The Agent-Instruction House Standard" \
            -B /tmp/nav.html -c pages.css -o _site/index.html
          pandoc ADOPTERS.md -s \
            --metadata title="Adopters — agent-standard" \
            -B /tmp/nav.html -c pages.css -o _site/adopters.html
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
