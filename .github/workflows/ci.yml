name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax check
        run: |
          status=0
          for f in bin/* tests/*.sh templates/hooks/scripts/*.sh templates/git/hooks/*; do
            [ -f "$f" ] || continue
            if bash -n "$f"; then echo "ok: $f"; else echo "SYNTAX ERROR: $f"; status=1; fi
          done
          exit "$status"
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S warning bin/* tests/*.sh templates/hooks/scripts/*.sh templates/git/hooks/pre-commit

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run script tests
        run: tests/run-tests.sh

  no-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Guard against personal config leaking in
        run: |
          # This standard is public POLICY; personal CONFIG (emails, tokens, org ids)
          # must never land here. Fail the build if it does.
          if grep -rniE '@(gmail|googlemail|outlook|yahoo)\.com|team_[A-Za-z0-9]{15,}|vercel-token-[a-z]' \
               --include='*.md' --include='*.sh' --exclude-dir=.git . ; then
            echo "::error::Personal config (email / org id / token) found — keep it out of the public standard."
            exit 1
          fi
          echo "clean: no personal config found"
